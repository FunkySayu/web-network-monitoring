services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    networks:
      - monitor-network
    # Run as root to allow ping
    user: root
    cap_add:
      - NET_RAW

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_BACKEND_URL=ws://localhost:8080
    networks:
      - monitor-network
    depends_on:
      - backend

networks:
  monitor-network:
    driver: bridge
